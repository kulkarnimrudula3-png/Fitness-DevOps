apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-ab-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness-ab
      version: a
  template:
    metadata:
      labels:
        app: aceest-fitness-ab
        version: a
    spec:
      containers:
        - name: aceest-fitness
          image: YOUR_DOCKERHUB_USERNAME/aceest-fitness:v1
          ports:
            - containerPort: 5000
