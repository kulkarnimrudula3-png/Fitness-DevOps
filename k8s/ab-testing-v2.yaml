apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-ab-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness-ab
      version: b
  template:
    metadata:
      labels:
        app: aceest-fitness-ab
        version: b
    spec:
      containers:
        - name: aceest-fitness
          image: YOUR_DOCKERHUB_USERNAME/aceest-fitness:v2
          ports:
            - containerPort: 5000
