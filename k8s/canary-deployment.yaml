apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      version: canary
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: canary
    spec:
      containers:
        - name: aceest-fitness
          image: YOUR_DOCKERHUB_USERNAME/aceest-fitness:v2
          ports:
            - containerPort: 5000
