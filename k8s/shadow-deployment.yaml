apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness-shadow
  template:
    metadata:
      labels:
        app: aceest-fitness-shadow
    spec:
      containers:
        - name: aceest-fitness-shadow
          image: YOUR_DOCKERHUB_USERNAME/aceest-fitness:v2
          ports:
            - containerPort: 5000
# Shadow deployment is deployed separately. Real traffic is mirrored by ingress/service-mesh tools in production.
